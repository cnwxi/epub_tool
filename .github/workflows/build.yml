name: Build And Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_HTTP_MULTIPLEXING: false
  CARGO_NET_RETRY: 10

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Create a GitHub release with bundled artifacts"
        required: true
        default: true
        type: boolean
      version:
        description: "Release version"
        required: false
        default: ""
      body:
        description: "Release body text（留空使用默认安装指引）"
        required: false
        default: ""

jobs:
  prepare:
    name: Resolve Release Version
    runs-on: ubuntu-22.04
    outputs:
      app_version: ${{ steps.release_version.outputs.app_version }}
      asset_version: ${{ steps.release_version.outputs.asset_version }}
      release_version: ${{ steps.release_version.outputs.release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release version
        id: release_version
        shell: bash
        run: |
          app_version=$(sed -n 's/^version = "\(.*\)"/\1/p' src-tauri/Cargo.toml | head -n 1)
          if [ -z "$app_version" ]; then
            echo "无法从 src-tauri/Cargo.toml 读取应用版本" >&2
            exit 1
          fi

          if [ -n "${{ inputs.version }}" ]; then
            asset_version="${{ inputs.version }}"
            asset_version="${asset_version#v}"
          else
            asset_version="$app_version"
          fi

          release_version="v$asset_version"

          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "asset_version=$asset_version" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target.platform }}-${{ matrix.target.arch }}-${{ matrix.ocr.variant }}
    runs-on: ${{ matrix.target.runner }}
    needs: prepare
    permissions:
      contents: read
    env:
      EPUB_TOOL_OCR_MODEL_NAME: ${{ matrix.ocr.model_name }}
      EPUB_TOOL_DEFAULT_OCR_MODEL_NAME: ${{ matrix.ocr.model_name }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - platform: linux
            arch: x64
            runner: ubuntu-22.04
            artifact_name: linux-x64-bundle
          - platform: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            artifact_name: linux-arm64-bundle
          - platform: windows
            arch: x64
            runner: windows-2022
            artifact_name: windows-x64-bundle
          - platform: windows
            arch: arm64
            runner: windows-11-arm
            artifact_name: windows-arm64-bundle
          - platform: macos
            arch: x64
            runner: macos-15-intel
            artifact_name: macos-x64-bundle
          - platform: macos
            arch: arm64
            runner: macos-14
            artifact_name: macos-arm64-bundle
        ocr:
          - variant: small
            model_name: PP-OCRv6_small_rec
          # medium 版发布产物暂时关闭；保留模型配置与本地维护脚本，避免发布资产体积翻倍。
          # - variant: medium
          #   model_name: PP-OCRv6_medium_rec

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Node.js with npm cache
        if: github.ref == 'refs/heads/main'
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Node.js without npm cache
        if: github.ref != 'refs/heads/main'
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.target.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install JavaScript dependencies
        run: |
          npm ci
          npm --prefix frontend ci

      - name: Install Python dependencies
        run: python -m pip install -r requirements/requirements.txt pyinstaller

      - name: Configure OCR bundle variant
        run: python scripts/configure_ocr_bundle_variant.py

      - name: Verify bundled ONNX OCR model
        run: python scripts/verify_ocr_onnx_models.py

      - name: Run Python tests
        run: python -m unittest discover -s tests

      - name: Fetch Rust dependencies
        shell: bash
        run: |
          set -euo pipefail
          cd src-tauri
          for attempt in 1 2 3 4 5; do
            if cargo fetch --locked; then
              exit 0
            fi
            delay=$((attempt * 15))
            echo "cargo fetch failed on attempt ${attempt}; retrying in ${delay}s..."
            sleep "$delay"
          done
          cargo fetch --locked

      - name: Build Tauri app
        if: matrix.target.platform != 'macos'
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tauriScript: npm run tauri --

      - name: Build macOS app bundle
        if: matrix.target.platform == 'macos'
        run: npm run tauri -- build --bundles app

      - name: Create macOS DMG
        if: matrix.target.platform == 'macos'
        shell: bash
        env:
          APP_VERSION: ${{ needs.prepare.outputs.app_version }}
          ARCH: ${{ matrix.target.arch }}
        run: |
          set -euo pipefail

          app_path="src-tauri/target/release/bundle/macos/Epub Tool NewUI.app"
          dmg_dir="src-tauri/target/release/bundle/dmg"
          dmg_path="$dmg_dir/Epub Tool NewUI_${APP_VERSION}_${ARCH}.dmg"

          if [ ! -d "$app_path" ]; then
            echo "Tauri 未生成 .app，无法创建 DMG。" >&2
            exit 1
          fi

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT

          mkdir -p "$dmg_dir"
          rm -f "$dmg_path"
          ditto "$app_path" "$tmp_dir/Epub Tool NewUI.app"
          ln -s /Applications "$tmp_dir/Applications"
          hdiutil create \
            -volname "Epub Tool NewUI" \
            -srcfolder "$tmp_dir" \
            -ov \
            -format UDZO \
            "$dmg_path"
          hdiutil verify "$dmg_path"
          ls -lh "$dmg_path"

      - name: Prepare renamed release assets
        if: inputs.release
        shell: bash
        env:
          ASSET_VERSION: ${{ needs.prepare.outputs.asset_version }}
          PLATFORM: ${{ matrix.target.platform }}
          ARCH: ${{ matrix.target.arch }}
          OCR_VARIANT: ${{ matrix.ocr.variant }}
          PRODUCT_STEM: Epub.Tool.NewUI
        run: |
          set -euo pipefail

          bundle_dir="src-tauri/target/release/bundle"
          release_dir="release-assets"
          mkdir -p "$release_dir"

          while IFS= read -r -d '' file; do
            filename="$(basename "$file")"
            case "$filename" in
              *.AppImage)
                target="${PRODUCT_STEM}_${ASSET_VERSION}_${PLATFORM}_${ARCH}_${OCR_VARIANT}.AppImage"
                ;;
              *.deb)
                target="${PRODUCT_STEM}_${ASSET_VERSION}_${PLATFORM}_${ARCH}_${OCR_VARIANT}.deb"
                ;;
              *.rpm)
                target="${PRODUCT_STEM}_${ASSET_VERSION}_${PLATFORM}_${ARCH}_${OCR_VARIANT}.rpm"
                ;;
              *.dmg)
                target="${PRODUCT_STEM}_${ASSET_VERSION}_${PLATFORM}_${ARCH}_${OCR_VARIANT}.dmg"
                ;;
              *.app.tar.gz)
                target="${PRODUCT_STEM}_${ASSET_VERSION}_${PLATFORM}_${ARCH}_${OCR_VARIANT}.app.tar.gz"
                ;;
              *-setup.exe)
                target="${PRODUCT_STEM}_${ASSET_VERSION}_${PLATFORM}_${ARCH}_${OCR_VARIANT}_setup.exe"
                ;;
              *.msi)
                target="${PRODUCT_STEM}_${ASSET_VERSION}_${PLATFORM}_${ARCH}_${OCR_VARIANT}.msi"
                ;;
              *)
                continue
                ;;
            esac

            cp "$file" "$release_dir/$target"
          done < <(find "$bundle_dir" -type f -print0)

          if [ -z "$(find "$release_dir" -type f -print -quit)" ]; then
            echo "未找到可上传的 release 资产" >&2
            exit 1
          fi

          ls -la "$release_dir"

      - name: Upload renamed release assets
        if: inputs.release
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ matrix.target.platform }}-${{ matrix.target.arch }}-${{ matrix.ocr.variant }}
          path: release-assets
          if-no-files-found: error

      - name: Upload workflow artifacts
        if: ${{ !inputs.release }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target.artifact_name }}-${{ matrix.ocr.variant }}
          path: src-tauri/target/release/bundle
          if-no-files-found: error

  cleanup_node_cache:
    name: Cleanup npm caches
    if: always()
    runs-on: ubuntu-22.04
    needs:
      - build
    permissions:
      actions: write
      contents: read
    steps:
      - name: Prune GitHub Actions npm caches
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          MAIN_REF: refs/heads/main
        shell: bash
        run: |
          set -euo pipefail

          main_cache_json="$(gh cache list --ref "$MAIN_REF" --key "node-cache-" --limit 1000 --json id,key,createdAt)"
          main_cache_count="$(printf '%s' "$main_cache_json" | jq 'length')"
          echo "main 分支 npm cache 数量: $main_cache_count"

          keep_main_ids="$(
            printf '%s' "$main_cache_json" | jq -r '
              sort_by(.key | sub("-[^-]+$"; ""))
              | group_by(.key | sub("-[^-]+$"; ""))
              | .[]
              | sort_by(.createdAt)
              | reverse
              | .[0].id
            '
          )"

          delete_main_ids="$(
            printf '%s' "$main_cache_json" | jq -r '
              sort_by(.key | sub("-[^-]+$"; ""))
              | group_by(.key | sub("-[^-]+$"; ""))
              | .[]
              | sort_by(.createdAt)
              | reverse
              | .[1:][]?
              | .id
            '
          )"

          other_branch_ids="$(
            gh cache list --key "node-cache-" --limit 1000 --json id,ref \
              | jq -r --arg main_ref "$MAIN_REF" '.[] | select(.ref != $main_ref) | .id'
          )"

          delete_ids="$(
            {
              printf '%s\n' "$delete_main_ids"
              printf '%s\n' "$other_branch_ids"
            } | awk 'NF' | sort -u
          )"

          echo "保留的 main cache:"
          if [ -n "$keep_main_ids" ]; then
            printf '%s\n' "$keep_main_ids"
          else
            echo "无"
          fi

          if [ -z "$delete_ids" ]; then
            echo "没有需要删除的 npm cache。"
            exit 0
          fi

          echo "开始删除以下 npm cache:"
          printf '%s\n' "$delete_ids"

          while IFS= read -r cache_id; do
            [ -n "$cache_id" ] || continue
            gh cache delete "$cache_id"
          done <<< "$delete_ids"

  publish_release:
    name: Publish Release
    if: inputs.release
    runs-on: ubuntu-22.04
    needs:
      - prepare
      - build
    permissions:
      contents: write
    steps:
      - name: Download renamed release assets
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Prepare release body
        shell: bash
        env:
          RELEASE_BODY: ${{ inputs.body }}
        run: |
          set -euo pipefail
          cat > release-body.md <<'MARKDOWN'
          ## 安装

          当前发布包内置 small OCR 模型，速度更快，安装包体积更小。

          ### macOS

          ```bash
          brew tap cnwxi/tap
          brew install --cask epub-tool-newui
          ```

          Homebrew 默认安装 small 版，并会自动匹配 Intel / Apple Silicon 架构。也可下载下方 `macos_x64_small.dmg` 或 `macos_arm64_small.dmg`。

          ### Linux

          下载下方 `linux_x64_small.AppImage` 或 `linux_arm64_small.AppImage`，添加执行权限后运行：

          ```bash
          chmod +x Epub.Tool.NewUI_*.AppImage
          ./Epub.Tool.NewUI_*.AppImage
          ```

          也可使用 `.deb` 或 `.rpm` 包安装。

          ### Windows

          下载下方 `windows_x64_small_setup.exe` / `windows_arm64_small_setup.exe` 或对应 `.msi`，双击安装。

          ---

          📖 [README](https://github.com/cnwxi/epub_tool#readme) · 📝 [更新日志](https://github.com/cnwxi/epub_tool/blob/main/assets/docs/CHANGELOG.md)
          MARKDOWN

          if [ -n "$RELEASE_BODY" ]; then
            printf '%s\n' "$RELEASE_BODY" > release-body.md
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.release_version }}
          name: ${{ needs.prepare.outputs.release_version }}
          body_path: release-body.md
          files: release-assets/*
          fail_on_unmatched_files: true
          overwrite_files: true

  update_homebrew_tap:
    name: Update Homebrew Tap
    if: inputs.release
    runs-on: ubuntu-22.04
    needs:
      - prepare
      - publish_release
    permissions:
      contents: read
    steps:
      - name: Find macOS dmg assets
        id: asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare.outputs.release_version }}"

          arm_name=$(gh release view "$tag" --repo "${{ github.repository }}" --json assets \
            --jq '.assets[] | select(.name | test("macos_arm64_small\\.dmg$")) | .name' | head -n 1)
          arm_url=$(gh release view "$tag" --repo "${{ github.repository }}" --json assets \
            --jq '.assets[] | select(.name | test("macos_arm64_small\\.dmg$")) | .url' | head -n 1)
          intel_name=$(gh release view "$tag" --repo "${{ github.repository }}" --json assets \
            --jq '.assets[] | select(.name | test("macos_x64_small\\.dmg$")) | .name' | head -n 1)
          intel_url=$(gh release view "$tag" --repo "${{ github.repository }}" --json assets \
            --jq '.assets[] | select(.name | test("macos_x64_small\\.dmg$")) | .url' | head -n 1)

          if [ -z "$arm_url" ] || [ -z "$intel_url" ]; then
            echo "未找到完整 macOS small dmg 资产，跳过 Homebrew Tap 更新"
            echo "  arm64: ${arm_name:-missing}"
            echo "  x64:   ${intel_name:-missing}"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "arm_name=$arm_name" >> "$GITHUB_OUTPUT"
          echo "arm_url=$arm_url" >> "$GITHUB_OUTPUT"
          echo "intel_name=$intel_name" >> "$GITHUB_OUTPUT"
          echo "intel_url=$intel_url" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Compute sha256
        if: steps.asset.outputs.skip != 'true'
        id: sha
        shell: bash
        run: |
          set -euo pipefail
          arm_url="${{ steps.asset.outputs.arm_url }}"
          intel_url="${{ steps.asset.outputs.intel_url }}"

          echo "正在下载 arm64: $arm_url"
          curl -fsSL "$arm_url" -o /tmp/epub-tool-arm64.dmg
          sha_arm=$(shasum -a 256 /tmp/epub-tool-arm64.dmg | awk '{print $1}')

          echo "正在下载 x64: $intel_url"
          curl -fsSL "$intel_url" -o /tmp/epub-tool-x64.dmg
          sha_intel=$(shasum -a 256 /tmp/epub-tool-x64.dmg | awk '{print $1}')

          echo "sha256_arm=$sha_arm"
          echo "sha256_intel=$sha_intel"
          echo "sha256_arm=$sha_arm" >> "$GITHUB_OUTPUT"
          echo "sha256_intel=$sha_intel" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repo
        if: steps.asset.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          repository: cnwxi/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap-repo

      - name: Update cask formula
        if: steps.asset.outputs.skip != 'true'
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.asset_version }}"
          SHA_ARM="${{ steps.sha.outputs.sha256_arm }}"
          SHA_INTEL="${{ steps.sha.outputs.sha256_intel }}"
          FORMULA="tap-repo/Casks/epub-tool-newui.rb"
          VERSION_PLACEHOLDER='#{version}'
          ARCH_PLACEHOLDER='#{arch}'
          URL="https://github.com/cnwxi/epub_tool/releases/download/v${VERSION_PLACEHOLDER}/Epub.Tool.NewUI_${VERSION_PLACEHOLDER}_macos_${ARCH_PLACEHOLDER}_small.dmg"

          echo "更新公式:"
          echo "  version:      $VERSION"
          echo "  sha256 arm:   $SHA_ARM"
          echo "  sha256 intel: $SHA_INTEL"
          echo "  url:          $URL"

          export VERSION SHA_ARM SHA_INTEL URL
          python - "$FORMULA" <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          formula = Path(sys.argv[1])
          text = formula.read_text()
          version = os.environ["VERSION"]
          sha_arm = os.environ["SHA_ARM"]
          sha_intel = os.environ["SHA_INTEL"]
          url = os.environ["URL"]

          arch_line = '  arch arm: "arm64", intel: "x64"'
          sha_block = f'  sha256 arm: "{sha_arm}",\n         intel: "{sha_intel}"'
          url_line = f'  url "{url}"'

          text = re.sub(r'(?m)^  version ".*"$', f'  version "{version}"', text, count=1)
          if re.search(r'(?m)^  arch ', text):
              text = re.sub(r'(?m)^  arch .*$', arch_line, text, count=1)
          else:
              text = re.sub(r'(?m)^(  version ".*"\n)', r'\1' + arch_line + '\n', text, count=1)
          text = re.sub(r'(?ms)^  sha256 .+?(?=\n  url )', sha_block, text, count=1)
          text = re.sub(r'(?m)^  url ".*"$', url_line, text, count=1)

          missing = [
              needle
              for needle in (arch_line, sha_block, url_line)
              if needle not in text
          ]
          if missing:
              raise SystemExit(f"公式更新失败，缺少片段: {missing}")
          formula.write_text(text)
          PY

          echo "--- 更新后的公式 ---"
          cat "$FORMULA"

      - name: Commit and push
        if: steps.asset.outputs.skip != 'true'
        shell: bash
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${TAP_TOKEN}@github.com/cnwxi/homebrew-tap.git"
          git add Casks/epub-tool-newui.rb
          if git diff --staged --quiet; then
            echo "公式无变化，跳过提交"
            exit 0
          fi
          git commit -m "Update epub-tool-newui to v${{ needs.prepare.outputs.asset_version }}"
          git push origin main
