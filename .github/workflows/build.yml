name: Build And Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Create a GitHub release with bundled artifacts"
        required: true
        default: true
        type: boolean
      version:
        description: "Release version"
        required: false
        default: ""
      body:
        description: "Release body text（留空使用默认安装指引）"
        required: false
        default: ""

jobs:
  prepare:
    name: Resolve Release Version
    runs-on: ubuntu-22.04
    outputs:
      app_version: ${{ steps.release_version.outputs.app_version }}
      asset_version: ${{ steps.release_version.outputs.asset_version }}
      release_version: ${{ steps.release_version.outputs.release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve release version
        id: release_version
        shell: bash
        run: |
          app_version=$(sed -n 's/^version = "\(.*\)"/\1/p' src-tauri/Cargo.toml | head -n 1)
          if [ -z "$app_version" ]; then
            echo "无法从 src-tauri/Cargo.toml 读取应用版本" >&2
            exit 1
          fi

          if [ -n "${{ inputs.version }}" ]; then
            asset_version="${{ inputs.version }}"
            asset_version="${asset_version#v}"
          else
            asset_version="$app_version"
          fi

          release_version="v$asset_version"

          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "asset_version=$asset_version" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    needs: prepare
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x64
            runner: ubuntu-22.04
            artifact_name: linux-x64-bundle
          - platform: windows
            arch: x64
            runner: windows-2022
            artifact_name: windows-x64-bundle
          - platform: macos
            arch: arm64
            runner: macos-14
            artifact_name: macos-arm64-bundle

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Node.js with npm cache
        if: github.ref == 'refs/heads/main'
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Node.js without npm cache
        if: github.ref != 'refs/heads/main'
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install JavaScript dependencies
        run: |
          npm ci
          npm --prefix frontend ci

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt pyinstaller

      - name: Build Tauri app
        if: matrix.platform != 'macos'
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tauriScript: npm run tauri --

      - name: Build macOS app bundle
        if: matrix.platform == 'macos'
        run: npm run tauri -- build --bundles app

      - name: Create macOS DMG
        if: matrix.platform == 'macos'
        shell: bash
        env:
          APP_VERSION: ${{ needs.prepare.outputs.app_version }}
        run: |
          set -euo pipefail

          app_path="src-tauri/target/release/bundle/macos/Epub Tool NewUI.app"
          dmg_dir="src-tauri/target/release/bundle/dmg"
          dmg_path="$dmg_dir/Epub Tool NewUI_${APP_VERSION}_aarch64.dmg"

          if [ ! -d "$app_path" ]; then
            echo "Tauri 未生成 .app，无法创建 DMG。" >&2
            exit 1
          fi

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "$tmp_dir"' EXIT

          mkdir -p "$dmg_dir"
          rm -f "$dmg_path"
          ditto "$app_path" "$tmp_dir/Epub Tool NewUI.app"
          hdiutil create \
            -volname "Epub Tool NewUI" \
            -srcfolder "$tmp_dir" \
            -ov \
            -format UDZO \
            "$dmg_path"
          hdiutil verify "$dmg_path"
          ls -lh "$dmg_path"

      - name: Prepare renamed release assets
        if: inputs.release
        shell: bash
        env:
          ASSET_VERSION: ${{ needs.prepare.outputs.asset_version }}
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
          PRODUCT_STEM: Epub.Tool.NewUI
        run: |
          set -euo pipefail

          bundle_dir="src-tauri/target/release/bundle"
          release_dir="release-assets"
          mkdir -p "$release_dir"

          while IFS= read -r -d '' file; do
            filename="$(basename "$file")"
            case "$filename" in
              *.AppImage)
                target="${PRODUCT_STEM}_${ASSET_VERSION}_${PLATFORM}_${ARCH}.AppImage"
                ;;
              *.deb)
                target="${PRODUCT_STEM}_${ASSET_VERSION}_${PLATFORM}_${ARCH}.deb"
                ;;
              *.rpm)
                target="${PRODUCT_STEM}_${ASSET_VERSION}_${PLATFORM}_${ARCH}.rpm"
                ;;
              *.dmg)
                target="${PRODUCT_STEM}_${ASSET_VERSION}_${PLATFORM}_${ARCH}.dmg"
                ;;
              *.app.tar.gz)
                target="${PRODUCT_STEM}_${ASSET_VERSION}_${PLATFORM}_${ARCH}.app.tar.gz"
                ;;
              *-setup.exe)
                target="${PRODUCT_STEM}_${ASSET_VERSION}_${PLATFORM}_${ARCH}_setup.exe"
                ;;
              *.msi)
                target="${PRODUCT_STEM}_${ASSET_VERSION}_${PLATFORM}_${ARCH}.msi"
                ;;
              *)
                continue
                ;;
            esac

            cp "$file" "$release_dir/$target"
          done < <(find "$bundle_dir" -type f -print0)

          if [ -z "$(find "$release_dir" -type f -print -quit)" ]; then
            echo "未找到可上传的 release 资产" >&2
            exit 1
          fi

          ls -la "$release_dir"

      - name: Upload renamed release assets
        if: inputs.release
        uses: actions/upload-artifact@v6
        with:
          name: release-assets-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-assets
          if-no-files-found: error

      - name: Upload workflow artifacts
        if: ${{ !inputs.release }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/release/bundle
          if-no-files-found: error

  cleanup_node_cache:
    name: Cleanup npm caches
    if: always()
    runs-on: ubuntu-22.04
    needs:
      - build
    permissions:
      actions: write
      contents: read
    steps:
      - name: Prune GitHub Actions npm caches
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          MAIN_REF: refs/heads/main
        shell: bash
        run: |
          set -euo pipefail

          main_cache_json="$(gh cache list --ref "$MAIN_REF" --key "node-cache-" --limit 1000 --json id,key,createdAt)"
          main_cache_count="$(printf '%s' "$main_cache_json" | jq 'length')"
          echo "main 分支 npm cache 数量: $main_cache_count"

          keep_main_ids="$(
            printf '%s' "$main_cache_json" | jq -r '
              sort_by(.key | sub("-[^-]+$"; ""))
              | group_by(.key | sub("-[^-]+$"; ""))
              | .[]
              | sort_by(.createdAt)
              | reverse
              | .[0].id
            '
          )"

          delete_main_ids="$(
            printf '%s' "$main_cache_json" | jq -r '
              sort_by(.key | sub("-[^-]+$"; ""))
              | group_by(.key | sub("-[^-]+$"; ""))
              | .[]
              | sort_by(.createdAt)
              | reverse
              | .[1:][]?
              | .id
            '
          )"

          other_branch_ids="$(
            gh cache list --key "node-cache-" --limit 1000 --json id,ref \
              | jq -r --arg main_ref "$MAIN_REF" '.[] | select(.ref != $main_ref) | .id'
          )"

          delete_ids="$(
            {
              printf '%s\n' "$delete_main_ids"
              printf '%s\n' "$other_branch_ids"
            } | awk 'NF' | sort -u
          )"

          echo "保留的 main cache:"
          if [ -n "$keep_main_ids" ]; then
            printf '%s\n' "$keep_main_ids"
          else
            echo "无"
          fi

          if [ -z "$delete_ids" ]; then
            echo "没有需要删除的 npm cache。"
            exit 0
          fi

          echo "开始删除以下 npm cache:"
          printf '%s\n' "$delete_ids"

          while IFS= read -r cache_id; do
            [ -n "$cache_id" ] || continue
            gh cache delete "$cache_id"
          done <<< "$delete_ids"

  publish_release:
    name: Publish Release
    if: inputs.release
    runs-on: ubuntu-22.04
    needs:
      - prepare
      - build
    permissions:
      contents: write
    steps:
      - name: Download renamed release assets
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Prepare release body
        shell: bash
        env:
          RELEASE_BODY: ${{ inputs.body }}
        run: |
          set -euo pipefail
          cat > release-body.md <<'MARKDOWN'
          ## 安装

          ### macOS

          ```bash
          brew tap cnwxi/tap
          brew install --cask epub-tool-newui
          ```

          或下载下方 `macos_arm64.dmg`，双击挂载后将应用拖入 `/Applications`。

          ### Linux

          下载下方 `linux_x64.AppImage`，添加执行权限后运行：

          ```bash
          chmod +x Epub.Tool.NewUI_*.AppImage
          ./Epub.Tool.NewUI_*.AppImage
          ```

          也可使用 `.deb` 或 `.rpm` 包安装。

          ### Windows

          下载下方 `windows_x64_setup.exe` 或 `.msi`，双击安装。

          ---

          📖 [README](https://github.com/cnwxi/epub_tool#readme) · 📝 [更新日志](https://github.com/cnwxi/epub_tool/blob/main/CHANGELOG.md)
          MARKDOWN

          if [ -n "$RELEASE_BODY" ]; then
            printf '%s\n' "$RELEASE_BODY" > release-body.md
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.release_version }}
          name: ${{ needs.prepare.outputs.release_version }}
          body_path: release-body.md
          files: release-assets/*
          fail_on_unmatched_files: true
          overwrite_files: true

  update_homebrew_tap:
    name: Update Homebrew Tap
    if: inputs.release
    runs-on: ubuntu-22.04
    needs:
      - prepare
      - publish_release
    permissions:
      contents: read
    steps:
      - name: Find macOS dmg asset
        id: asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.prepare.outputs.release_version }}"
          dmg_url=$(gh release view "$tag" --repo "${{ github.repository }}" --json assets \
            --jq '.assets[] | select(.name | test("macos.*\\.dmg$")) | .url')

          if [ -z "$dmg_url" ]; then
            echo "未找到 macOS dmg 资产，跳过 Homebrew Tap 更新"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "url=$dmg_url" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Compute sha256
        if: steps.asset.outputs.skip != 'true'
        id: sha
        shell: bash
        run: |
          set -euo pipefail
          url="${{ steps.asset.outputs.url }}"
          echo "正在下载: $url"
          curl -fsSL "$url" -o /tmp/epub-tool.dmg
          sha=$(shasum -a 256 /tmp/epub-tool.dmg | awk '{print $1}')
          echo "sha256=$sha"
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repo
        if: steps.asset.outputs.skip != 'true'
        uses: actions/checkout@v5
        with:
          repository: cnwxi/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap-repo

      - name: Update cask formula
        if: steps.asset.outputs.skip != 'true'
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.asset_version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          FORMULA="tap-repo/Casks/epub-tool-newui.rb"

          echo "更新公式:"
          echo "  version: $VERSION"
          echo "  sha256:  $SHA"

          sed -i "s/version \".*\"/version \"$VERSION\"/" "$FORMULA"
          sed -i "s/sha256 \".*\"/sha256 \"$SHA\"/" "$FORMULA"

          echo "--- 更新后的公式 ---"
          cat "$FORMULA"

      - name: Commit and push
        if: steps.asset.outputs.skip != 'true'
        shell: bash
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${TAP_TOKEN}@github.com/cnwxi/homebrew-tap.git"
          git add Casks/epub-tool-newui.rb
          if git diff --staged --quiet; then
            echo "公式无变化，跳过提交"
            exit 0
          fi
          git commit -m "Update epub-tool-newui to v${{ needs.prepare.outputs.asset_version }}"
          git push origin main
