name: Build And Release

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Create a GitHub release with bundled artifacts"
        required: true
        default: true
        type: boolean
      version:
        description: "Release version"
        required: false
        default: ""
      body:
        description: "Release body text"
        required: true
        default: "详情请查看 README 与 doc/ 下的核心说明文档。当前 NEWUI 分支基于 Tauri 2 + Vue 3 + Python 后端桥接。"

jobs:
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x64
            runner: ubuntu-22.04
            artifact_name: linux-x64-bundle
          - platform: windows
            arch: x64
            runner: windows-2022
            artifact_name: windows-x64-bundle
          - platform: macos
            arch: arm64
            runner: macos-14
            artifact_name: macos-arm64-bundle

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve release version
        id: release_version
        shell: bash
        run: |
          app_version=$(sed -n 's/^version = "\(.*\)"/\1/p' src-tauri/Cargo.toml | head -n 1)
          if [ -z "$app_version" ]; then
            echo "无法从 src-tauri/Cargo.toml 读取应用版本" >&2
            exit 1
          fi

          if [ -n "${{ github.event.inputs.version }}" ]; then
            release_version="${{ github.event.inputs.version }}"
          else
            release_version="v$app_version"
          fi

          echo "value=$release_version" >> "$GITHUB_OUTPUT"

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install JavaScript dependencies
        run: |
          npm ci
          npm --prefix frontend ci

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt pyinstaller

      - name: Build Tauri app and create release
        if: github.event.inputs.release == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tauriScript: npm run tauri:build
          tagName: ${{ steps.release_version.outputs.value }}
          releaseName: ${{ steps.release_version.outputs.value }}
          releaseBody: ${{ github.event.inputs.body }}

      - name: Build Tauri app without release
        if: github.event.inputs.release != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tauriScript: npm run tauri:build

      - name: Upload workflow artifacts
        if: github.event.inputs.release != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/release/bundle
          if-no-files-found: error
