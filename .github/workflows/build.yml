name: Build And Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      release:
        description: "Create a GitHub release with bundled artifacts"
        required: true
        default: true
        type: boolean
      version:
        description: "Release version"
        required: false
        default: ""
      body:
        description: "Release body text"
        required: true
        default: "详情请查看 README 与 doc/ 下的核心说明文档。当前 NEWUI 分支基于 Tauri 2 + Vue 3 + Python 后端桥接。"

jobs:
  prepare:
    name: Resolve Release Version
    runs-on: ubuntu-22.04
    outputs:
      app_version: ${{ steps.release_version.outputs.app_version }}
      asset_version: ${{ steps.release_version.outputs.asset_version }}
      release_version: ${{ steps.release_version.outputs.release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve release version
        id: release_version
        shell: bash
        run: |
          app_version=$(sed -n 's/^version = "\(.*\)"/\1/p' src-tauri/Cargo.toml | head -n 1)
          if [ -z "$app_version" ]; then
            echo "无法从 src-tauri/Cargo.toml 读取应用版本" >&2
            exit 1
          fi

          if [ -n "${{ inputs.version }}" ]; then
            asset_version="${{ inputs.version }}"
            asset_version="${asset_version#v}"
          else
            asset_version="$app_version"
          fi

          release_version="v$asset_version"

          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "asset_version=$asset_version" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    needs: prepare
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            arch: x64
            runner: ubuntu-22.04
            artifact_name: linux-x64-bundle
          - platform: windows
            arch: x64
            runner: windows-2022
            artifact_name: windows-x64-bundle
          - platform: macos
            arch: arm64
            runner: macos-14
            artifact_name: macos-arm64-bundle

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup Node.js with npm cache
        if: github.ref == 'refs/heads/main'
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - name: Setup Node.js without npm cache
        if: github.ref != 'refs/heads/main'
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            patchelf \
            wget

      - name: Install JavaScript dependencies
        run: |
          npm ci
          npm --prefix frontend ci

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt pyinstaller

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tauriScript: npm run tauri --

      - name: Prepare renamed release assets
        if: inputs.release
        shell: bash
        env:
          ASSET_VERSION: ${{ needs.prepare.outputs.asset_version }}
          PLATFORM: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
          PRODUCT_STEM: Epub.Tool.NewUI
        run: |
          set -euo pipefail

          bundle_dir="src-tauri/target/release/bundle"
          release_dir="release-assets"
          mkdir -p "$release_dir"

          while IFS= read -r -d '' file; do
            filename="$(basename "$file")"
            case "$filename" in
              *.AppImage)
                target="${PRODUCT_STEM}_${ASSET_VERSION}_${PLATFORM}_${ARCH}.AppImage"
                ;;
              *.deb)
                target="${PRODUCT_STEM}_${ASSET_VERSION}_${PLATFORM}_${ARCH}.deb"
                ;;
              *.rpm)
                target="${PRODUCT_STEM}_${ASSET_VERSION}_${PLATFORM}_${ARCH}.rpm"
                ;;
              *.dmg)
                target="${PRODUCT_STEM}_${ASSET_VERSION}_${PLATFORM}_${ARCH}.dmg"
                ;;
              *.app.tar.gz)
                target="${PRODUCT_STEM}_${ASSET_VERSION}_${PLATFORM}_${ARCH}.app.tar.gz"
                ;;
              *-setup.exe)
                target="${PRODUCT_STEM}_${ASSET_VERSION}_${PLATFORM}_${ARCH}_setup.exe"
                ;;
              *.msi)
                target="${PRODUCT_STEM}_${ASSET_VERSION}_${PLATFORM}_${ARCH}.msi"
                ;;
              *)
                continue
                ;;
            esac

            cp "$file" "$release_dir/$target"
          done < <(find "$bundle_dir" -type f -print0)

          if [ -z "$(find "$release_dir" -type f -print -quit)" ]; then
            echo "未找到可上传的 release 资产" >&2
            exit 1
          fi

          ls -la "$release_dir"

      - name: Upload renamed release assets
        if: inputs.release
        uses: actions/upload-artifact@v6
        with:
          name: release-assets-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-assets
          if-no-files-found: error

      - name: Upload workflow artifacts
        if: ${{ !inputs.release }}
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: src-tauri/target/release/bundle
          if-no-files-found: error

  cleanup_node_cache:
    name: Cleanup npm caches
    if: always()
    runs-on: ubuntu-22.04
    needs:
      - build
    permissions:
      actions: write
      contents: read
    steps:
      - name: Prune GitHub Actions npm caches
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          MAIN_REF: refs/heads/main
        shell: bash
        run: |
          set -euo pipefail

          main_cache_json="$(gh cache list --ref "$MAIN_REF" --key "node-cache-" --limit 1000 --json id,key,createdAt)"
          main_cache_count="$(printf '%s' "$main_cache_json" | jq 'length')"
          echo "main 分支 npm cache 数量: $main_cache_count"

          keep_main_ids="$(
            printf '%s' "$main_cache_json" | jq -r '
              sort_by(.key | sub("-[^-]+$"; ""))
              | group_by(.key | sub("-[^-]+$"; ""))
              | .[]
              | sort_by(.createdAt)
              | reverse
              | .[0].id
            '
          )"

          delete_main_ids="$(
            printf '%s' "$main_cache_json" | jq -r '
              sort_by(.key | sub("-[^-]+$"; ""))
              | group_by(.key | sub("-[^-]+$"; ""))
              | .[]
              | sort_by(.createdAt)
              | reverse
              | .[1:][]?
              | .id
            '
          )"

          other_branch_ids="$(
            gh cache list --key "node-cache-" --limit 1000 --json id,ref \
              | jq -r --arg main_ref "$MAIN_REF" '.[] | select(.ref != $main_ref) | .id'
          )"

          delete_ids="$(
            {
              printf '%s\n' "$delete_main_ids"
              printf '%s\n' "$other_branch_ids"
            } | awk 'NF' | sort -u
          )"

          echo "保留的 main cache:"
          if [ -n "$keep_main_ids" ]; then
            printf '%s\n' "$keep_main_ids"
          else
            echo "无"
          fi

          if [ -z "$delete_ids" ]; then
            echo "没有需要删除的 npm cache。"
            exit 0
          fi

          echo "开始删除以下 npm cache:"
          printf '%s\n' "$delete_ids"

          while IFS= read -r cache_id; do
            [ -n "$cache_id" ] || continue
            gh cache delete "$cache_id"
          done <<< "$delete_ids"

  publish_release:
    name: Publish Release
    if: inputs.release
    runs-on: ubuntu-22.04
    needs:
      - prepare
      - build
    permissions:
      contents: write
    steps:
      - name: Download renamed release assets
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.release_version }}
          name: ${{ needs.prepare.outputs.release_version }}
          body: ${{ inputs.body }}
          files: release-assets/*
          fail_on_unmatched_files: true
          overwrite_files: true
