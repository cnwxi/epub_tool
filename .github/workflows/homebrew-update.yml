name: Update Homebrew Tap

# 注意：自动更新已集成到 build.yml 的 update_homebrew_tap job 中。
# 此 workflow 仅作为手动 fallback，用于修复或重试更新。
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag（必填，如 v26.5.7）"
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-tap:
    name: Update Cask Formula
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Resolve version
        id: version
        shell: bash
        run: |
          tag="${{ inputs.tag }}"
          version="${tag#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Find macOS dmg assets
        id: asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${{ steps.version.outputs.tag }}"

          arm_name=$(gh release view "$tag" --repo "${{ github.repository }}" --json assets \
            --jq '.assets[] | select(.name | test("macos_arm64_small\\.dmg$")) | .name' | head -n 1)
          arm_url=$(gh release view "$tag" --repo "${{ github.repository }}" --json assets \
            --jq '.assets[] | select(.name | test("macos_arm64_small\\.dmg$")) | .url' | head -n 1)
          intel_name=$(gh release view "$tag" --repo "${{ github.repository }}" --json assets \
            --jq '.assets[] | select(.name | test("macos_x64_small\\.dmg$")) | .name' | head -n 1)
          intel_url=$(gh release view "$tag" --repo "${{ github.repository }}" --json assets \
            --jq '.assets[] | select(.name | test("macos_x64_small\\.dmg$")) | .url' | head -n 1)

          if [ -z "$arm_url" ] || [ -z "$intel_url" ]; then
            echo "未找到完整 macOS small dmg 资产，跳过更新"
            echo "  arm64: ${arm_name:-missing}"
            echo "  x64:   ${intel_name:-missing}"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "arm_name=$arm_name" >> "$GITHUB_OUTPUT"
          echo "arm_url=$arm_url" >> "$GITHUB_OUTPUT"
          echo "intel_name=$intel_name" >> "$GITHUB_OUTPUT"
          echo "intel_url=$intel_url" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Compute sha256
        if: steps.asset.outputs.skip != 'true'
        id: sha
        shell: bash
        run: |
          set -euo pipefail
          arm_url="${{ steps.asset.outputs.arm_url }}"
          intel_url="${{ steps.asset.outputs.intel_url }}"

          echo "正在下载 arm64: $arm_url"
          curl -fsSL "$arm_url" -o /tmp/epub-tool-arm64.dmg
          sha_arm=$(shasum -a 256 /tmp/epub-tool-arm64.dmg | awk '{print $1}')

          echo "正在下载 x64: $intel_url"
          curl -fsSL "$intel_url" -o /tmp/epub-tool-x64.dmg
          sha_intel=$(shasum -a 256 /tmp/epub-tool-x64.dmg | awk '{print $1}')

          echo "sha256_arm=$sha_arm"
          echo "sha256_intel=$sha_intel"
          echo "sha256_arm=$sha_arm" >> "$GITHUB_OUTPUT"
          echo "sha256_intel=$sha_intel" >> "$GITHUB_OUTPUT"

      - name: Checkout tap repo
        if: steps.asset.outputs.skip != 'true'
        uses: actions/checkout@v6
        with:
          repository: cnwxi/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap-repo

      - name: Update cask formula
        if: steps.asset.outputs.skip != 'true'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA_ARM="${{ steps.sha.outputs.sha256_arm }}"
          SHA_INTEL="${{ steps.sha.outputs.sha256_intel }}"
          FORMULA="tap-repo/Casks/epub-tool-newui.rb"
          VERSION_PLACEHOLDER='#{version}'
          ARCH_PLACEHOLDER='#{arch}'
          URL="https://github.com/cnwxi/epub_tool/releases/download/v${VERSION_PLACEHOLDER}/Epub.Tool.NewUI_${VERSION_PLACEHOLDER}_macos_${ARCH_PLACEHOLDER}_small.dmg"

          echo "更新公式:"
          echo "  version:      $VERSION"
          echo "  sha256 arm:   $SHA_ARM"
          echo "  sha256 intel: $SHA_INTEL"
          echo "  url:          $URL"

          export VERSION SHA_ARM SHA_INTEL URL
          python - "$FORMULA" <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          formula = Path(sys.argv[1])
          text = formula.read_text()
          version = os.environ["VERSION"]
          sha_arm = os.environ["SHA_ARM"]
          sha_intel = os.environ["SHA_INTEL"]
          url = os.environ["URL"]

          arch_line = '  arch arm: "arm64", intel: "x64"'
          sha_block = f'  sha256 arm: "{sha_arm}",\n         intel: "{sha_intel}"'
          url_line = f'  url "{url}"'

          text = re.sub(r'(?m)^  version ".*"$', f'  version "{version}"', text, count=1)
          if re.search(r'(?m)^  arch ', text):
              text = re.sub(r'(?m)^  arch .*$', arch_line, text, count=1)
          else:
              text = re.sub(r'(?m)^(  version ".*"\n)', r'\1' + arch_line + '\n', text, count=1)
          text = re.sub(r'(?ms)^  sha256 .+?(?=\n  url )', sha_block, text, count=1)
          text = re.sub(r'(?m)^  url ".*"$', url_line, text, count=1)

          missing = [
              needle
              for needle in (arch_line, sha_block, url_line)
              if needle not in text
          ]
          if missing:
              raise SystemExit(f"公式更新失败，缺少片段: {missing}")
          formula.write_text(text)
          PY

          echo "--- 更新后的公式 ---"
          cat "$FORMULA"

      - name: Commit and push
        if: steps.asset.outputs.skip != 'true'
        shell: bash
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${TAP_TOKEN}@github.com/cnwxi/homebrew-tap.git"
          git add Casks/epub-tool-newui.rb
          if git diff --staged --quiet; then
            echo "公式无变化，跳过提交"
            exit 0
          fi
          git commit -m "Update epub-tool-newui to v${{ steps.version.outputs.version }}"
          git push origin main
